<div class="liste-container">
  <h2>{{ isEditMode ? '✏️ Modifier l\'État du Joueur' : '➕ Ajouter un Joueur' }}</h2>
  <div class="login-box" style="max-width: 600px; margin: auto; text-align: left;">
    <div class="form-group">
      <label>Position sur le plateau</label>
      <input type="number" [(ngModel)]="pj.positionPlateau">
    </div>
    <div class="form-group">
      <label>Effet Actif</label>
      <input type="text" [(ngModel)]="pj.effetActif" placeholder="Ex: SPRINT, AUCUN, BOUCLIER">
    </div>
    <div class="form-group">
      <label>Durée de l'effet (Tours)</label>
      <input type="number" [(ngModel)]="pj.dureeEffet">
    </div>
    <div class="actions-split mt-20">
      <button class="btn-secondaire" (click)="router.navigate(['/partie-joueurs'])">Annuler</button>
      <button class="btn-principal" (click)="enregistrer()">Sauvegarder</button>
    </div>
  </div>
</div>
