<div class="login-container">
  <div class="login-box">
    
    <div class="server-selector" style="margin-bottom: 20px; text-align: center;">
      <label style="font-size: 0.9rem; color: #64748b; margin-right: 10px;">Serveur Actif :</label>
      <select [ngModel]="serveurService.getBackend()" (ngModelChange)="serveurService.setBackend($event)" style="padding: 5px; border-radius: 4px;">
        <option value="spring">🟢 Spring Boot (Java)</option>
        <option value="django">🔵 Django (Python)</option>
      </select>
    </div>

    <h2>{{ isLoginMode ? 'Connexion' : 'Créer un compte' }}</h2>

    <div *ngIf="messageErreur" class="alert error">{{ messageErreur }}</div>
    <div *ngIf="messageSucces" class="alert success">{{ messageSucces }}</div>

    <form (ngSubmit)="onSubmit()">
      
      <div class="form-group" *ngIf="!isLoginMode">
        <label>Pseudo en jeu</label>
        <input type="text" name="pseudo" [(ngModel)]="formData.pseudo" placeholder="Ex: MaitreDuJeu" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="formData.email" placeholder="votre@email.com" required>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        
        <div class="password-container">
          <input 
            [type]="hidePassword ? 'password' : 'text'" 
            id="password" 
            [(ngModel)]="formData.motDePasse" name="password" 
            placeholder="Votre mot de passe" 
            required
          >
          <button 
            type="button" 
            class="btn-eye" 
            (click)="togglePasswordVisibility()"
            [attr.title]="hidePassword ? 'Afficher' : 'Masquer'"
          >
            {{ hidePassword ? '👁️' : '🙈' }}
          </button>
        </div>

      </div>

      <button type="submit" class="btn-submit">
        {{ isLoginMode ? 'Se Connecter' : 'S\'inscrire' }}
      </button>
      
      <button *ngIf="isLoginMode" type="button" class="btn-submit" style="background: #8b5cf6; margin-top: 10px;" (click)="loginAsAdmin()">
        👑 Se connecter en tant qu'Admin
      </button>

    </form>

    <div class="toggle-mode">
      <span *ngIf="isLoginMode">
        Pas encore inscrit ? <a href="javascript:void(0)" (click)="basculerMode()">Cliquez ici pour créer un compte</a>.
      </span>
      <span *ngIf="!isLoginMode">
        Déjà un compte ? <a href="javascript:void(0)" (click)="basculerMode()">Connectez-vous ici</a>.
      </span>
    </div>

    <div class="divider">
      <span>OU</span>
    </div>

    <div class="social-login">
      <button class="btn-social btn-google" (click)="connexionSociale('google')">
        🌐 Continuer avec Google
      </button>
      <button class="btn-social btn-github" (click)="connexionSociale('github')">
        🐙 Continuer avec GitHub
      </button>
    </div>

  </div>
</div>
